          exit $failed

  test-swift:
    name: Test (Swift)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: algoc

      - name: Make binary executable
        run: chmod +x algoc

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Run stdlib tests
        run: |
          shopt -s globstar
          failed=0
          for file in stdlib/**/*.algoc; do
            echo "Testing: $file"
            if ! timeout 1200 ./algoc test "$file" -t swift; then
              echo "FAILED or TIMEOUT: $file"
              failed=1
            fi
          done
          exit $failed

  test-dart:
