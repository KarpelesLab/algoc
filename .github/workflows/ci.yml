      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: algoc

      - name: Make binary executable
        run: chmod +x algoc

      - name: Install GHDL
        run: |
          sudo apt-get update
          sudo apt-get install -y ghdl

      - name: Run stdlib tests
        run: |
          shopt -s globstar
