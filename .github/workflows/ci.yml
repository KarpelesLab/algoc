  test-objc:
    name: Test (Objective-C)
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Run stdlib tests
        run: |
          failed=0
          while IFS= read -r file; do
            echo "Testing: $file"
            if ! ./target/release/algoc test "$file" -t objc; then
              failed=1
            fi
          done < <(find stdlib -name '*.algoc' -type f)
          exit $failed

