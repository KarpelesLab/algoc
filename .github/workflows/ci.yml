name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run cargo tests
        run: cargo test

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: algoc
          path: target/release/algoc

  test-javascript:
    name: Test (JavaScript)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: algoc

      - name: Make binary executable
        run: chmod +x algoc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run stdlib tests
        run: |
          shopt -s globstar
          failed=0
          for file in stdlib/**/*.algoc; do
            echo "Testing: $file"
            if ! ./algoc test "$file" -t js; then
              failed=1
            fi
          done
          exit $failed

  test-python:
